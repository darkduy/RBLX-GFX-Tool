name: Build RBLX GFX Tool APK

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1: Build APK
  # ══════════════════════════════════════════════════════════════
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4    # Node 24

      - name: Set up JDK 17
        uses: actions/setup-java@v5  # Node 24
        with:
          java-version: "17"
          distribution: "temurin"

      # setup-gradle@v6 với gradle-version cụ thể → tự download Gradle 8.7
      # không cần gradle-wrapper.jar trong repo
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"   # download trực tiếp, bypass wrapper JAR


      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts \
            | sed 's/.*versionName *= *"\([^"]*\)".*/\1/' | head -1)
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build Release APK
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.build_type == 'release'
        run: gradle assembleRelease --stacktrace

      - name: Sign Release APK
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 chua duoc set — bo qua buoc ky APK"
            exit 0
          fi

          # Decode base64 — dùng tr để loại bỏ newline/space thừa trước khi decode
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > keystore.jks
          echo "Keystore size: $(ls -lh keystore.jks)"

          # Verify keystore hợp lệ với đúng password trước khi sign
          keytool -list             -keystore keystore.jks             -storepass "$STORE_PASSWORD"             -storetype PKCS12 2>&1 ||           keytool -list             -keystore keystore.jks             -storepass "$STORE_PASSWORD" 2>&1
          echo "Keystore verified ✅"

          APK_PATH=$(find app/build/outputs/apk/release \
            -name "*.apk" ! -name "*signed*" | head -1)
          SIGNED_PATH="${APK_PATH%.apk}-signed.apk"
          echo "Signing: $APK_PATH"

          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$SIGNED_PATH" \
            "$APK_PATH"

          echo "Signed APK: $SIGNED_PATH"
          rm -f keystore.jks

      - name: List generated APKs
        if: always()
        run: |
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; 2>/dev/null \
            || echo "No APKs found"

      - name: Upload Release APK
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4   # Node 24
        with:
          name: RBLX-GFX-Tool-release-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: ignore
